## PV Überschuss Real

Helfer/Sensor


{% set soc = states('sensor.byd_battery_box_premium_hv_ladezustand') | float(0) %}
{% set month = now().month %}

{# Winter (Okt-Mär): 80% SoC, sonst 60% #}
{% set threshold = 80 if month in [10, 11, 12, 1, 2, 3] else 60 %}

{% set pv = states('sensor.pv_anlagen') | float(0) %}
{% set haus = states('sensor.hausverbrauch_ohne_heizstab_watt') | float(0) %}
{% set klima = states('sensor.klimaanlage_power') | float(0) %}

{# Basis-Überschuss #}
{% set base_surplus = pv - haus - klima %}

{# Reservierung: Wenn SoC < Schwellenwert, ziehe 1500W ab #}
{% set reservation = 1500 if soc < threshold else 0 %}

{# Ergebnis #}
{{ [0, (base_surplus - reservation)] | max | round(0) }}