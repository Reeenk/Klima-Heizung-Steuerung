alias: "Klima: Automatik-Wächter"
description: "Setzt morgens nur die Weiche: Klima-Tag oder Heiz-Tag"
triggers:
  - trigger: sun
    event: sunrise
    offset: "-01:00:00"
    id: morgens_check
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: morgens_check
        sequence:
          - if:
              - condition: template
                alias: Gute Prognose heute?
                value_template: >
                  {{ states('sensor.solcast_pv_forecast_prognose_heute') |
                  float(0) >= 
                     states('input_number.pv_produktion_soll_tag') | float(15) }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.klima_automation
                data: {}
              - if:
                  - condition: state
                    entity_id: switch.heizung
                    state: "on"
                then:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.heizung
            else:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.klima_automation
                data: {}
