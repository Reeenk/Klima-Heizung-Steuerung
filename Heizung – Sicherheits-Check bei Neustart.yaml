alias: Heizung – Sicherheits-Check bei Neustart
description: Prüft nach Neustart, ob geheizt werden muss
triggers:
  - trigger: homeassistant
    event: start
    id: reboot
actions:
  - delay: "00:04:00"
  - if:
      - condition: state
        entity_id: input_boolean.klima_heizen
        state: "off"
      - condition: or
        conditions:
          - condition: numeric_state
            entity_id: sensor.wohnzimmer_temperatur
            below: 19.5
          - condition: numeric_state
            entity_id: sensor.johanna_temperatur
            below: 19.5
          - condition: numeric_state
            entity_id: sensor.schlafzimmer_temperatur_2
            below: 19.5
          - condition: numeric_state
            entity_id: sensor.sophia_temperatur
            below: 19.5
    then:
      - action: switch.turn_on
        target:
          entity_id: switch.heizung
      - action: notify.mobile_app_sven_iphone_15
        data:
          title: "Heizung sagt:"
          message: "Sicherheits-Check nach Neustart: Heizung AN 🔥"
